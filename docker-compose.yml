services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphawatch
      POSTGRES_PASSWORD: alphawatch
      POSTGRES_DB: alphawatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphawatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://alphawatch:alphawatch@postgres:5432/alphawatch
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
